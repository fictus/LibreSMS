name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest   # switch to Linux — avoids Windows MAUI workload issues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore LibreSMS/LibreSMS.csproj -p:TargetFrameworks=net10.0-android

      - name: Build & publish APK
        run: dotnet publish LibreSMS/LibreSMS.csproj -f net10.0-android -c Release

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '**/bin/Release/net10.0-android/publish/*.apk'
